<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Wrench -->
    <g transform="rotate(-45)">
      <rect x="-24" y="-120" width="48" height="180" rx="12" fill="white" opacity="0.95"/>
      <circle cx="0" cy="-120" r="48" fill="none" stroke="white" stroke-width="24" opacity="0.95"/>
      <rect x="-24" y="60" width="48" height="60" rx="8" fill="white" opacity="0.95"/>
    </g>
    <!-- Lightning bolt -->
    <polygon points="-10,-80 20,-10 -5,-10 10,80 -20,10 5,10" fill="#fbbf24" opacity="0.9"/>
  </g>
</svg>
